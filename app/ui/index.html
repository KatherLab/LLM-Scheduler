<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>vLLM Swapper</title>
  <link rel="stylesheet" href="/ui/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo">v</div>
      <div>
        <div class="title">vLLM Swapper</div>
        <div class="subtitle">Slurm-backed model scheduler + router</div>
      </div>
    </div>
    <div class="actions">
      <button id="refreshBtn" class="btn">Refresh</button>
    </div>
  </header>

  <main class="layout">
    <section class="panel">
      <h2>Models</h2>
      <div id="modelsList" class="grid"></div>
    </section>

    <section class="panel">
      <div class="row">
        <h2>Schedule (GPU timeline)</h2>
        <div class="hint">Visualization uses GPU “lanes” to show overlap. It displays <b>GPU counts</b> (not guaranteed physical GPU IDs).</div>
      </div>
      <div class="toolbar">
        <label>View window:
          <select id="windowSelect">
            <option value="12">12h</option>
            <option value="24" selected>24h</option>
            <option value="48">48h</option>
            <option value="168">7d</option>
          </select>
        </label>
        <label>Show:
          <select id="showSelect">
            <option value="all" selected>All leases</option>
            <option value="running">Running only</option>
            <option value="scheduled">Scheduled only</option>
          </select>
        </label>
      </div>
      <div id="timelineWrap" class="timelineWrap">
        <svg id="timelineSvg"></svg>
      </div>
    </section>

    <section class="panel">
      <h2>Leases</h2>
      <div id="leasesList" class="list"></div>
    </section>
  </main>

  <dialog id="startDialog" class="dialog">
    <form method="dialog" id="startForm">
      <h3>Start / Schedule model</h3>
      <div class="formGrid">
        <label>Model
          <select id="startModel"></select>
        </label>
        <label>Owner (optional)
          <input id="startOwner" placeholder="fabian" />
        </label>
        <label>Start time (optional)
          <input id="startBegin" type="datetime-local" />
        </label>
        <label>Duration (hours)
          <input id="startDuration" type="number" min="0.05" step="0.25" value="6" />
        </label>
        <label>GPUs (override)
          <input id="startGpus" type="number" min="1" max="16" placeholder="(catalog default)" />
        </label>
        <label>TP size (override)
          <input id="startTp" type="number" min="1" max="16" placeholder="(catalog default)" />
        </label>
      </div>
      <div class="dialogActions">
        <button class="btn" value="cancel">Cancel</button>
        <button class="btn primary" id="startSubmit" value="default">Submit</button>
      </div>
      <div id="startError" class="error"></div>
    </form>
  </dialog>

  <script src="/ui/app.js"></script>
</body>
</html>
