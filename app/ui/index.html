<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Model Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: { brand: { 50:'#f0f9ff', 500:'#0ea5e9', 600:'#0284c7', 900:'#0c4a6e' } }
        }
      }
    }
  </script>
  <style>
    .no-select { user-select: none; }
    .timeline-scroll::-webkit-scrollbar { height: 10px; width: 10px; }
    .timeline-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 6px; }
    .timeline-scroll::-webkit-scrollbar-thumb:hover { background: #64748b; }
  </style>
</head>

<body class="bg-gray-50 text-gray-900 dark:bg-slate-900 dark:text-gray-100 min-h-screen flex flex-col">

  <!-- Header -->
  <header class="sticky top-0 z-40 w-full border-b border-gray-200 dark:border-slate-800 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md">
    <div class="max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-brand-500 flex items-center justify-center text-white font-bold text-lg">M</div>
        <div class="leading-tight">
          <div class="text-xl font-semibold tracking-tight">Model Hub</div>
          <div id="subtitle" class="text-xs text-slate-500 dark:text-slate-400">Loading…</div>
        </div>
      </div>

      <div class="flex items-center gap-3">
        <button id="themeToggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-slate-800 transition" title="Toggle theme">
          <svg id="iconSun" class="hidden w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
          <svg id="iconMoon" class="block w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 24.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
        </button>

        <div class="hidden md:flex items-center gap-2 text-sm">
          <label class="text-slate-500 dark:text-slate-400">View</label>
          <select id="windowSelect" class="bg-white dark:bg-slate-800 border border-gray-300 dark:border-slate-700 text-sm rounded-md px-2 py-1">
            <option value="6">6h</option>
            <option value="12">12h</option>
            <option value="24" selected>24h</option>
            <option value="48">48h</option>
          </select>
          <select id="zoomSelect" class="bg-white dark:bg-slate-800 border border-gray-300 dark:border-slate-700 text-sm rounded-md px-2 py-1">
            <option value="60">Compact</option>
            <option value="90" selected>Normal</option>
            <option value="130">Large</option>
          </select>
        </div>

        <button id="refreshBtn" class="px-4 py-2 text-sm font-medium text-white bg-brand-600 rounded-md hover:bg-brand-500 transition">
          Refresh
        </button>
      </div>
    </div>
  </header>

  <!-- Main layout -->
  <main class="flex-1 max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-8 py-6 w-full">
    <div class="grid grid-cols-1 xl:grid-cols-12 gap-6">

      <!-- Left: Catalog -->
      <aside class="xl:col-span-4 space-y-4">
        <div class="bg-white dark:bg-slate-800 rounded-xl border border-gray-200 dark:border-slate-700 shadow-sm p-4">
          <div class="flex items-center justify-between">
            <h2 class="text-lg font-semibold">Model Catalog</h2>
            <span id="modelCount" class="text-xs text-slate-500">—</span>
          </div>

          <div class="mt-3 flex gap-2">
            <input id="searchInput" type="text" placeholder="Search models…" class="flex-1 px-3 py-2 rounded-md bg-white dark:bg-slate-900 border border-gray-300 dark:border-slate-700 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500" />
            <select id="filterSelect" class="px-2 py-2 rounded-md bg-white dark:bg-slate-900 border border-gray-300 dark:border-slate-700 text-sm">
              <option value="all" selected>All</option>
              <option value="ready">Running now</option>
              <option value="stopped">Not running</option>
            </select>
          </div>

          <div class="mt-4 space-y-3 max-h-[72vh] overflow-y-auto pr-1">
            <div id="modelsList" class="space-y-3"></div>
          </div>
        </div>
      </aside>

      <!-- Right: Timeline + Jobs -->
      <section class="xl:col-span-8 space-y-6">

        <!-- Timeline -->
        <div class="bg-white dark:bg-slate-800 rounded-xl border border-gray-200 dark:border-slate-700 shadow-sm overflow-hidden">
          <div class="p-4 flex items-start justify-between gap-4">
            <div>
              <h2 class="text-lg font-semibold">GPU Schedule</h2>
              <p class="text-sm text-slate-500 dark:text-slate-400">
                Click empty space to schedule. Click a block to extend, move, or stop.
              </p>
            </div>

            <div class="flex items-center gap-2">
              <button id="newBookingBtn" class="px-3 py-2 text-sm rounded-md bg-brand-600 text-white hover:bg-brand-500 transition">
                New Booking
              </button>
            </div>
          </div>

          <div class="timeline-scroll overflow-x-auto overflow-y-hidden border-t border-gray-200 dark:border-slate-700">
            <svg id="timelineSvg" class="block no-select"></svg>
          </div>

          <div id="timelineLegend" class="px-4 py-3 border-t border-gray-200 dark:border-slate-700 flex flex-wrap items-center gap-3 text-xs text-slate-500 dark:text-slate-400">
            <span class="inline-flex items-center gap-2"><span class="w-3 h-3 rounded bg-emerald-500/30 border border-emerald-400"></span>Running</span>
            <span class="inline-flex items-center gap-2"><span class="w-3 h-3 rounded bg-sky-500/25 border border-sky-400 border-dashed"></span>Planned</span>
            <span class="inline-flex items-center gap-2"><span class="w-3 h-3 rounded bg-red-500/25 border border-red-400"></span>Conflict</span>
          </div>
        </div>

        <!-- Jobs table -->
        <div class="bg-white dark:bg-slate-800 rounded-xl border border-gray-200 dark:border-slate-700 shadow-sm overflow-hidden">
          <div class="p-4 flex items-center justify-between">
            <h2 class="text-lg font-semibold">Bookings</h2>
            <div class="text-xs text-slate-500" id="bookingHint"></div>
          </div>
          <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200 dark:divide-slate-700">
              <thead class="bg-gray-50 dark:bg-slate-700/50">
                <tr>
                  <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">Model</th>
                  <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">Status</th>
                  <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">When</th>
                  <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">GPUs</th>
                  <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">Actions</th>
                </tr>
              </thead>
              <tbody id="leasesTableBody" class="divide-y divide-gray-200 dark:divide-slate-700"></tbody>
            </table>
          </div>
        </div>

      </section>
    </div>
  </main>

  <!-- Booking drawer (simple modal) -->
  <div id="drawerBackdrop" class="fixed inset-0 z-50 hidden bg-black/40" aria-hidden="true"></div>

  <div id="bookingDrawer" class="fixed top-0 right-0 z-50 h-full w-full sm:w-[460px] translate-x-full transition-transform duration-200 bg-white dark:bg-slate-900 border-l border-gray-200 dark:border-slate-800 shadow-xl">
    <div class="p-4 border-b border-gray-200 dark:border-slate-800 flex items-start justify-between">
      <div>
        <div id="drawerTitle" class="text-lg font-semibold">New Booking</div>
        <div id="drawerSubtitle" class="text-xs text-slate-500 dark:text-slate-400">Schedule a model on the GPUs</div>
      </div>
      <button id="drawerClose" class="p-2 rounded-md hover:bg-gray-100 dark:hover:bg-slate-800">✕</button>
    </div>

    <div class="p-4 space-y-4">
      <div>
        <label class="block text-sm font-medium">Model</label>
        <select id="drawerModel" class="mt-1 w-full px-3 py-2 rounded-md bg-white dark:bg-slate-950 border border-gray-300 dark:border-slate-700 text-sm"></select>
        <div id="drawerModelMeta" class="mt-1 text-xs text-slate-500"></div>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium">GPUs needed</label>
          <input id="drawerGpus" type="number" min="1" disabled
  class="mt-1 w-full px-3 py-2 rounded-md bg-white dark:bg-slate-950 border border-gray-300 dark:border-slate-700 text-sm opacity-70 cursor-not-allowed" />
        </div>
        <div>
          <label class="block text-sm font-medium">Duration (hours)</label>
          <input id="drawerDuration" type="number" min="1" step="1" class="mt-1 w-full px-3 py-2 rounded-md bg-white dark:bg-slate-950 border border-gray-300 dark:border-slate-700 text-sm" />
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium">Start</label>
        <select id="drawerStartMode" class="mt-1 w-full px-3 py-2 rounded-md bg-white dark:bg-slate-950 border border-gray-300 dark:border-slate-700 text-sm">
          <option value="now">Start now</option>
          <option value="time">Schedule time</option>
        </select>
        <input id="drawerBeginAt" type="datetime-local" class="mt-2 hidden w-full px-3 py-2 rounded-md bg-white dark:bg-slate-950 border border-gray-300 dark:border-slate-700 text-sm" />
        <p class="mt-2 text-xs text-slate-500">Tip: clicking the timeline pre-fills a start time.</p>
      </div>

      <div id="drawerError" class="hidden text-sm text-red-400 bg-red-500/10 border border-red-500/20 rounded-md p-3"></div>

      <div class="pt-2 flex gap-2">
        <button id="drawerSave" class="flex-1 px-4 py-2 rounded-md bg-brand-600 text-white hover:bg-brand-500 transition">Save</button>
        <button id="drawerCancel" class="px-4 py-2 rounded-md border border-gray-300 dark:border-slate-700 hover:bg-gray-50 dark:hover:bg-slate-800 transition">Cancel</button>
      </div>
    </div>
  </div>

  <script src="/ui/app.js"></script>
</body>
</html>
