<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Model Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 50: '#f0f9ff', 500: '#0ea5e9', 600: '#0284c7', 900: '#0c4a6e' }
          }
        }
      }
    }
  </script>
  <style>
    /* Custom Scrollbar for the timeline */
    .timeline-scroll::-webkit-scrollbar { height: 8px; }
    .timeline-scroll::-webkit-scrollbar-track { background: transparent; }
    .timeline-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    .timeline-scroll::-webkit-scrollbar-thumb:hover { background: #64748b; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-slate-900 dark:text-gray-100 min-h-screen flex flex-col transition-colors duration-200">

  <!-- Header -->
  <header class="sticky top-0 z-30 w-full border-b border-gray-200 dark:border-slate-800 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-brand-500 flex items-center justify-center text-white font-bold text-lg">M</div>
        <h1 class="text-xl font-semibold tracking-tight">Model Hub</h1>
      </div>
      <div class="flex items-center gap-4">
        <button id="themeToggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-slate-800 transition">
            <!-- Sun Icon -->
            <svg id="iconSun" class="hidden w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            <!-- Moon Icon -->
            <svg id="iconMoon" class="block w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 24.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
        </button>
        <button id="refreshBtn" class="px-4 py-2 text-sm font-medium text-white bg-brand-600 rounded-md hover:bg-brand-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 transition">
          Refresh
        </button>
      </div>
    </div>
  </header>

  <main class="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full space-y-8">

    <!-- Timeline Section -->
    <section class="space-y-4">
      <div class="flex items-center justify-between">
        <h2 class="text-lg font-medium">GPU Availability</h2>
        <select id="windowSelect" class="bg-white dark:bg-slate-800 border border-gray-300 dark:border-slate-700 text-sm rounded-md px-3 py-1">
          <option value="12">Next 12 Hours</option>
          <option value="24" selected>Next 24 Hours</option>
          <option value="48">Next 48 Hours</option>
        </select>
      </div>
      
      <!-- Scrollable Timeline Container -->
      <div class="relative w-full bg-white dark:bg-slate-800 rounded-xl border border-gray-200 dark:border-slate-700 shadow-sm overflow-hidden">
        <div class="timeline-scroll overflow-x-auto overflow-y-hidden w-full pb-2">
           <!-- SVG will be injected here with dynamic width -->
           <svg id="timelineSvg" class="block"></svg>
        </div>
      </div>
    </section>

    <!-- Models Grid -->
    <section class="space-y-4">
      <h2 class="text-lg font-medium">Available Models</h2>
      <div id="modelsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        <!-- Cards injected by JS -->
      </div>
    </section>
    
    <!-- Active Leases (Table) -->
    <section class="space-y-4">
        <h2 class="text-lg font-medium">Active Jobs</h2>
        <div class="bg-white dark:bg-slate-800 rounded-xl border border-gray-200 dark:border-slate-700 overflow-hidden">
            <table class="min-w-full divide-y divide-gray-200 dark:divide-slate-700">
                <thead class="bg-gray-50 dark:bg-slate-700/50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Model</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">State</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Ends In</th>
                        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Actions</th>
                    </tr>
                </thead>
                <tbody id="leasesTableBody" class="divide-y divide-gray-200 dark:divide-slate-700">
                    <!-- Rows injected by JS -->
                </tbody>
            </table>
        </div>
    </section>

  </main>

  <!-- Launch Modal -->
  <div id="launchModal" class="fixed inset-0 z-50 hidden overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
    <div class="flex items-end justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:block sm:p-0">
      <div class="fixed inset-0 transition-opacity bg-gray-500 bg-opacity-75 backdrop-blur-sm" aria-hidden="true" onclick="closeModal()"></div>
      <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
      
      <div class="inline-block px-4 pt-5 pb-4 text-left align-bottom transition-all transform bg-white dark:bg-slate-800 rounded-lg shadow-xl sm:my-8 sm:align-middle sm:max-w-lg sm:w-full sm:p-6">
        <div class="sm:flex sm:items-start">
          <div class="w-full text-center sm:text-left">
            <h3 class="text-lg font-medium leading-6 text-gray-900 dark:text-white" id="modal-title">Launch Model</h3>
            <p id="modalModelName" class="mt-1 text-sm text-brand-500 font-mono"></p>
            
            <div class="mt-6 space-y-4">
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Duration</label>
                    <div class="mt-2 grid grid-cols-4 gap-3">
                        <button type="button" onclick="setDuration(1)" class="dur-btn px-3 py-2 border border-gray-300 dark:border-slate-600 rounded-md text-sm font-medium hover:bg-brand-50 dark:hover:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-brand-500">1h</button>
                        <button type="button" onclick="setDuration(4)" class="dur-btn px-3 py-2 border border-gray-300 dark:border-slate-600 rounded-md text-sm font-medium hover:bg-brand-50 dark:hover:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-brand-500">4h</button>
                        <button type="button" onclick="setDuration(8)" class="dur-btn px-3 py-2 border border-gray-300 dark:border-slate-600 rounded-md text-sm font-medium hover:bg-brand-50 dark:hover:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-brand-500">8h</button>
                        <button type="button" onclick="setDuration(24)" class="dur-btn px-3 py-2 border border-gray-300 dark:border-slate-600 rounded-md text-sm font-medium hover:bg-brand-50 dark:hover:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-brand-500">24h</button>
                    </div>
                    <input type="hidden" id="launchDuration" value="1">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Start Time</label>
                    <select id="launchWhen" class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-gray-300 dark:border-slate-600 dark:bg-slate-700 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm rounded-md">
                        <option value="now">Immediately (Now)</option>
                        <option value="queue">Next available slot</option>
                    </select>
                </div>
                
                <div id="launchError" class="text-red-500 text-sm hidden"></div>
            </div>
          </div>
        </div>
        <div class="mt-5 sm:mt-4 sm:flex sm:flex-row-reverse">
          <button type="button" onclick="submitLaunch()" class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-brand-600 text-base font-medium text-white hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 sm:ml-3 sm:w-auto sm:text-sm">
            Launch
          </button>
          <button type="button" onclick="closeModal()" class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 dark:border-slate-600 shadow-sm px-4 py-2 bg-white dark:bg-slate-700 text-base font-medium text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-slate-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 sm:mt-0 sm:w-auto sm:text-sm">
            Cancel
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="/ui/app.js"></script>
</body>
</html>
